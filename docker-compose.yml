services:

  # ---------- Infraestrutura ----------

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antifraude
      POSTGRES_USER: antifraude
      POSTGRES_PASSWORD: antifraude
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---------- Observabilidade (opcional / diferencial) ----------

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

  # ---------- Microsserviços ----------

  risk-scoring-service:
    build: ./services/risk-scoring-service
    depends_on:
      - kafka
      - postgres
      - redis
    ports:
      - "8081:8081"

  quarantine-service:
    build: ./services/quarantine-service
    depends_on:
      - kafka
      - postgres
      - redis
    ports:
      - "8082:8082"

  event-ingestion-service:
    build: ./services/event-ingestion-service
    depends_on:
      - kafka
    ports:
      - "8083:8083"

volumes:
  postgres-data:
  kafka-data:
